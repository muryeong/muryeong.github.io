<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
        }
        nav {
            display: flex;
            gap: 15px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .hero {
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            width: 100%;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
        <nav>
            <a href="#youtube">YouTube</a>
            <a href="#instagram">Instagram</a>
            <a href="#premium">Premium Content</a>
            <a href="#ai-lab">AI Lab</a>
            <a href="#projects">Projects</a>
            <a href="#knowledge">Knowledge</a>
            <a href="#experiments">Experiments</a>
            <a href="#tools">Tools</a>
            <a href="#free-fire">Free Fire Newbie Corner</a>
        </nav>
    </header>
    <div class="hero">
        <h2>Welcome to My Digital Space</h2>
    </div>
    <div class="cards">
        <div class="card" id="youtube">
            <h3>YouTube Channel</h3>
        </div>
        <div class="card" id="instagram">
            <h3>Instagram</h3>
        </div>
        <div class="card" id="premium">
            <h3>Premium Content</h3>
        </div>
        <div class="card" id="ai-lab">
            <h3>AI Lab</h3>
        </div>
        <div class="card" id="projects">
            <h3>Projects</h3>
        </div>
        <div class="card" id="knowledge">
            <h3>Knowledge</h3>
        </div>
        <div class="card" id="experiments">
            <h3>Experiments</h3>
        </div>
        <div class="card" id="tools">
            <h3>Tools</h3>
        </div>
        <div class="card" id="free-fire">
            <h3>Free Fire Newbie Corner</h3>
        </div>
    </div>
</body>
</html>
